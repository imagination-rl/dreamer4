env_name: HalfCheetah-v4
num_loops: 500
rollouts_per_loop: 1
num_envs: 64
max_timesteps: 1000
replay_size: 1024
seed: 42
cpu: false

obs_dim: 17
num_latent_tokens: 4
dim_latent: 32
model_dim: 128
depth: 3
time_block_every: 2
final_special_cross_attn: false
reward_encoder_type: hl_gauss

world_model_batch_size: 128
world_model_train_steps: 13
world_model_early_pretrain_steps: 250
world_model_train_sequence_length: 200
world_model_learning_rate: 6.0e-4

imagination_batch_size: 512
imagination_horizon: 32
imagination_prompt_length: 8
imagination_prompt_probability: 1.0
imagination_train_steps: 3
imagination_generate_steps: 4

agent_learning_rate: 6.0e-4
use_muon_optimizer: true
optimizer_weight_decay: 0.01
objective: pmpo
pmpo_pos_to_neg_weight: 0.5
pmpo_kl_div_loss_weight: 0.3
use_delight_gating: false
add_action_embed_to_agent_token: true
agent_predicts_state: true
agent_state_pred_loss_weight: 0.1

pretrain_tokenizer_steps: 2000
pretrain_tokenizer_observations: 16384
tokenizer_batch_size: 1024
tokenizer_learning_rate: 6.0e-4
tokenizer_eval_every: 10
tokenizer_eval_batch_size: 2048

max_grad_norm: 1
use_tensorboard: true
log_dir: runs/halfcheetah_imagination
checkpoint_folder: checkpoints_halfcheetah_imagination
checkpoint_every: 25
checkpoint_path: null
clear_log_dir: false
unique_log_dir: true

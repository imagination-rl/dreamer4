# Environment and device setup
env_name: HalfCheetah-v4
seed: 42
cpu: false
require_cuda: true
allow_tf32: true
obs_dim: null

# Model architecture
num_latent_tokens: 4
dim_latent: 32
model_dim: 128
attn_heads: 4
attn_dim_head: 32
depth: 3
time_block_every: 2
final_special_cross_attn: false
reward_encoder_type: hl_gauss
prob_shortcut_train: null
policy_all_tokens: false

# Tokenizer pretraining
pretrain_tokenizer_steps: 1000
pretrain_tokenizer_observations: 8192
tokenizer_batch_size: 256
tokenizer_learning_rate: 0.0003
tokenizer_eval_every: 10
tokenizer_eval_batch_size: 2048

# Environment rollout collection
num_loops: 500
rollouts_per_loop: 1
num_envs: 32
env_vectorization_mode: async
max_timesteps: 750
replay_size: 256

# World model training
world_model_batch_size: 32
pretrain_world_model_finetune_steps: 64
pretrain_world_model_combined_steps: 256
world_model_train_steps: 32
world_model_train_sequence_length: 200
world_model_learning_rate: 0.0003

# Imagination rollout generation
imagination_batch_size: 128
imagination_horizon: 32
imagination_prompt_length: 8
imagination_prompt_probability: 1.0
imagination_train_steps: 10
imagination_generate_steps: 4
imagination_use_time_cache: true

# Agent learning in imagination
agent_learning_rate: 0.0003
objective: pmpo
pmpo_pos_to_neg_weight: 0.5
pmpo_kl_div_loss_weight: 0.3
use_delight_gating: false
agent_predicts_state: false
agent_state_pred_loss_weight: 0.1

# Optimization
use_muon_optimizer: true
optimizer_weight_decay: 0.01
max_grad_norm: 1

# torch.compile runtime
compile: null
compile_interact: true
compile_world_model: true
compile_generate: true
compile_learn: true
compile_backend: inductor
compile_mode: reduce-overhead
compile_fullgraph: false
compile_dynamic: false
compile_generate_cudagraphs: true
optimize_generate_compilation: true
track_compile_performance: false
return_compile_timings: false

# Profiling. Lightweight record_function timings are enabled by default.
# Full profile mode always exits after 5 warmup + 4 measured model steps.
collect_timings: true
profile: false
profile_memory: false
profile_record_shapes: false
profile_with_stack: false
profile_with_flops: false

# Logging and checkpoints
use_tensorboard: true
log_dir: runs/gym_imagination
run_name: halfcheetah_baseline
run_details: Baseline HalfCheetah-v4 Gym imagination run.
checkpoint_folder: checkpoints_gym_imagination
checkpoint_every: 25
checkpoint_path: null
clear_log_dir: false
unique_log_dir: true
